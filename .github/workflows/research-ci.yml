name: Research — ML Tests

on:
  push:
    branches: [main, develop]
    paths:
      - "research/**"
      - "shared/**"
      - ".github/workflows/research-ci.yml"
  pull_request:
    branches: [main]
    paths:
      - "research/**"
      - "shared/**"

env:
  PYTHON_VERSION: "3.11"

jobs:
  test-research:
    name: Research — pytest
    runs-on: ubuntu-latest
    needs: []   # shared-ci corre en paralelo, no es prerequisito aquí

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
          cache-dependency-path: research/requirements.txt

      - name: Install quant_shared + research deps
        run: |
          pip install -e shared/
          pip install numpy pandas scikit-learn xgboost scipy statsmodels joblib
          pip install pytest pytest-asyncio

      - name: Lint research/
        run: |
          pip install ruff
          ruff check research/models research/features research/risk || true

      - name: Run research tests
        run: |
          cd research && python -m pytest tests/ -q --tb=short
