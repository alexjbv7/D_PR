apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: los-ojos

bases:
  - ../../base

# Override image tags with production SHA
images:
  - name: los-ojos/market-intelligence
    newTag: "1.0.0"
  - name: los-ojos/macroeconomic
    newTag: "1.0.0"
  - name: los-ojos/onchain-analysis
    newTag: "1.0.0"
  - name: los-ojos/context-engine
    newTag: "1.0.0"
  - name: los-ojos/ml-feature-store
    newTag: "1.0.0"
  - name: los-ojos/realtime-signal
    newTag: "1.0.0"
  - name: los-ojos/strategy-orchestrator
    newTag: "1.0.0"
  - name: los-ojos/sec-research
    newTag: "1.0.0"
  - name: los-ojos/frontend
    newTag: "1.0.0"

# Production replicas
patches:
  - patch: |-
      - op: replace
        path: /spec/replicas
        value: 3
    target:
      kind: Deployment
      name: market-intelligence
  - patch: |-
      - op: replace
        path: /spec/replicas
        value: 3
    target:
      kind: Deployment
      name: context-engine
  - patch: |-
      - op: replace
        path: /spec/replicas
        value: 3
    target:
      kind: Deployment
      name: ml-feature-store
  - patch: |-
      - op: replace
        path: /spec/replicas
        value: 3
    target:
      kind: Deployment
      name: realtime-signal
  - patch: |-
      - op: replace
        path: /spec/replicas
        value: 3
    target:
      kind: Deployment
      name: frontend

# Production configmap overrides
configMapGenerator:
  - name: los-ojos-config
    behavior: merge
    literals:
      - LOG_LEVEL=WARNING
      - USE_FINBERT=true
