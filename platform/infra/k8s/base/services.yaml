# -----------------------------------------------------------------------
# Internal ClusterIP services for each microservice
# -----------------------------------------------------------------------

---
apiVersion: v1
kind: Service
metadata:
  name: market-intelligence
  namespace: los-ojos
  labels:
    app: market-intelligence
spec:
  selector:
    app: market-intelligence
  ports:
    - port: 8000
      targetPort: 8000
      name: http

