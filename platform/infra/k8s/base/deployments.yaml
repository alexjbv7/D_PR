# -----------------------------------------------------------------------
# Kubernetes Deployments — Los Ojos microservices
# Image tags are overridden by the production overlay via Kustomize.
# -----------------------------------------------------------------------

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: market-intelligence
  namespace: los-ojos
  labels:
    app: market-intelligence
spec:
  replicas: 2
  selector:
    matchLabels:
      app: market-intelligence
  template:
    metadata:
      labels:
        app: market-intelligence
    spec:
      containers:
        - name: market-intelligence
          image: los-ojos/market-intelligence:latest
          ports:
            - containerPort: 8000
          envFrom:
            - configMapRef:
                name: los-ojos-config
          env:
            - name: BINANCE_API_KEY
              valueFrom:
                secretKeyRef:
                  name: los-ojos-secrets
                  key: BINANCE_API_KEY
            - name: BINANCE_SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: los-ojos-secrets
                  key: BINANCE_SECRET_KEY
            - name: OPENBB_PAT
              valueFrom:
                secretKeyRef:
                  name: los-ojos-secrets
                  key: OPENBB_PAT
          resources:
            requests:
              cpu: "250m"
              memory: "512Mi"
            limits:
              cpu: "500m"
              memory: "1Gi"
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 15
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 10
            periodSeconds: 10

